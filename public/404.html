<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback for GitHub Pages: rewrite the URL so BrowserRouter can handle it.
      (function () {
        var repo = "/portugalapp";
        var l = window.location;
        var path = l.pathname.replace(repo, "") || "/";
        var redirect = repo + "/?p=" + encodeURIComponent(path) +
          (l.search ? "&q=" + encodeURIComponent(l.search.slice(1)) : "") +
          l.hash;
        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
